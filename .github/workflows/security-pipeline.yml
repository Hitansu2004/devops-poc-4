name: DevSecOps Security Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Test
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for SonarCloud to detect new code properly

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: my-app

      - name: Run Unit Tests
        run: mvn test
        working-directory: my-app

  # ─────────────────────────────────────────────
  # JOB 2: SonarCloud Code Quality Scan
  # ─────────────────────────────────────────────
  sonarcloud-scan:
    name: SonarCloud Code Quality Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn verify sonar:sonar \
            -Dsonar.projectKey=Hitansu2004_devops-poc-4 \
            -Dsonar.organization=hitansu2004 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN
        working-directory: my-app

  # ─────────────────────────────────────────────
  # JOB 3: CodeQL SAST Analysis
  # ─────────────────────────────────────────────
  codeql-sast:
    name: CodeQL SAST Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-and-quality

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build for CodeQL
        run: mvn clean package -DskipTests
        working-directory: my-app

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"

  # ─────────────────────────────────────────────
  # JOB 4: OWASP Dependency Check (fail on CVSS ≥ 7)
  # ─────────────────────────────────────────────
  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -Dformat=HTML \
            -DoutputDirectory=dependency-check-report
        working-directory: my-app
        continue-on-error: true  # We upload the report even if it fails

      - name: Upload Security Report Artifact
        uses: actions/upload-artifact@v4
        if: always()  # Always upload even if scan found issues
        with:
          name: owasp-security-report-${{ github.run_number }}
          path: my-app/dependency-check-report/
          retention-days: 30
